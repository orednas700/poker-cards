<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="./styles.css">

</head>

<body>
<main id="playing-cards">
  <div class="card black">
    <div class="left"><h2>A</h2>
    <h3>♠</h3></div>
    <div class="middle"><p class="big">♠</p></div>
    <div class="right">
    <h3>♠</h3><h2>A</h2></div></div>
  <div class="card black">
    <div class="left"><h2>6</h2>
    <h3>♠</h3></div>
    <div class="middle"><p class="big">♠</p></div>
    <div class="right">
    <h3>♠</h3><h2>6</h2></div></div>
  <div class="card red">
    <div class="left"><h2>2</h2>
    <h3>♥</h3></div>
    <div class="middle"><p class="big">♥</p></div>
    <div class="right">
    <h3>♥</h3><h2>2</h2></div></div>
  <div class="card red">
    <div class="left"><h2>10</h2>
    <h3>♦</h3></div>
    <div class="middle"><p class="big">♦</p></div>
    <div class="right">
    <h3>♦</h3><h2>10</h2></div></div>
  <div class="card black">
    <div class="left"><h2>5</h2>
    <h3>♣</h3></div>
    <div class="middle"><p class="big">♣</p></div>
    <div class="right">
    <h3>♣</h3><h2>5</h2></div>
  </div>
</main>
</body>

</html>
