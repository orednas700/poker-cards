<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="./styles.css">

</head>

<body>
<main id="playing-cards">
  <div class="card black">
    <div class="left"><p>A</p>
    <h3>♠</h3></div>
    <div class="middle"><p class="big">♠</p></div>
    <div class="right">
    <h3>♠</h3><p>A</p></div></div>
  <div class="card black">
    <div class="left"><p>6</p>
    <h3>♠</h3></div>
    <div class="middle"><p class="big">♠</p></div>
    <div class="right">
    <h3>♠</h3><p>6</p></div></div>
  <div class="card red">
    <div class="left"><p>2</p>
    <h3>♥</h3></div>
    <div class="middle"><p class="big">♥</p></div>
    <div class="right">
    <h3>♥</h3><p>2</p></div></div>
  <div class="card red">
    <div class="left"><p>10</p>
    <h3>♦</h3></div>
    <div class="middle"><p class="big">♦</p></div>
    <div class="right">
    <h3>♦</h3><p>10</p></div></div>
  <div class="card black">
    <div class="left"><p>5</p>
    <h3>♣</h3></div>
    <div class="middle"><p class="big">♣</p></div>
    <div class="right">
    <h3>♣</h3><p>5</p></div>
  </div>
</main>
</body>

</html>
